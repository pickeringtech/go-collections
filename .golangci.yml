# golangci-lint v2 configuration.
#
# Enabled linters back the product mission (trustworthy, readable collections):
#   - errcheck, govet, ineffassign, staticcheck, unused  (the v2 "standard" set;
#     staticcheck subsumes gosimple + stylecheck)
#   - unconvert   — flags redundant type conversions
#   - misspell    — catches typos in comments/docs
#   - revive      — fast, configurable style/lint rules
#   - cyclop      — cyclomatic complexity ceiling (readability standard)
#   - gocognit    — cognitive complexity ceiling (readability standard)
#
# CI currently runs this report-only; thresholds below are the agreed ceilings
# so they are meaningful the moment the gate is flipped to blocking.
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - unconvert
    - misspell
    - revive
    - cyclop
    - gocognit
  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
  exclusions:
    rules:
      # Tests, examples and benchmarks are allowed to be longer/more involved,
      # and don't form the public API — so the complexity ceilings and revive's
      # doc-comment / unused-parameter style rules don't apply to them.
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
          - revive

formatters:
  enable:
    - gofmt

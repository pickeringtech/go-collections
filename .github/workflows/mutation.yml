name: Mutation testing

# Mutation testing (gremlins) verifies that the *test suite catches regressions*,
# not merely that lines execute — the gap line coverage can't see (issue #32).
# It mutates the source (e.g. flips `<` to `<=`, negates conditionals) and checks
# whether a test fails. A surviving ("LIVED") mutant is a hole in the assertions.
#
# Why this lives in its own workflow rather than ci.yml:
#   Mutation testing re-runs the whole suite once *per mutant* (~400 mutants here),
#   so it is far too slow to gate every PR. Per #32 it must be bounded. Two shapes:
#     - full:   weekly + on-demand, the whole module, report-only.
#     - scoped: per-MERGE (merge_group) but limited to the lines the merge changes
#               (gremlins --diff), so cost is proportional to the change. Moved off
#               the per-PR path in #150: installing gremlins fetches a newer Go
#               toolchain, so paying that per push was waste; running it once per
#               merge in the queue keeps the signal at a fraction of the cost.
#
# Gating policy (mirrors ci.yml's COVERAGE_MIN ratchet):
#   Both jobs are REPORT-ONLY today — `continue-on-error: true` keeps them
#   non-gating while the first runs are triaged for equivalent/known mutants
#   (see docs/mutation-testing.md). To start gating, raise the *_MIN floors
#   below and remove `continue-on-error` from that job. Ratchet the floors
#   upward only, never down.

on:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC — weekly full run on main
  workflow_dispatch:        # manual on-demand full run (any branch)
  merge_group:              # per-merge, scoped to the lines the merge changes

permissions:
  contents: read

# Keyed by run_id so runs never cancel each other: merge_group runs are
# sequential per merge, and the weekly/manual full runs must each complete.
concurrency:
  group: mutation-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  # Pin the tool so runs are reproducible; bump deliberately (cf. GOSEC_VERSION
  # in ci.yml). gremlins itself is built with the Go version its module requires
  # (>= 1.25 for v0.6.0), auto-fetched by the toolchain; the *project's* tests
  # still run under the go.mod version (1.24) — see the install step.
  GREMLINS_VERSION: "v0.6.0"
  # Mutation-score floors. 0 == report-only (gremlins does not enforce). Raise
  # these as the suite improves; this is the single ratchet knob for both jobs.
  MUTATION_EFFICACY_MIN: "0"   # % of (KILLED) / (KILLED + LIVED)
  MUTATION_MCOVER_MIN: "0"     # % of (KILLED + LIVED) / (all mutants)

jobs:
  full:
    name: Full run (weekly / on-demand) — report-only
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # project tests run under the declared Go version
      # Cache the compiled gremlins binary, keyed on its pinned version + OS
      # (issue #151). gremlins builds itself with the Go its own module pins
      # (GOTOOLCHAIN=auto below), so that version is fixed per GREMLINS_VERSION —
      # the pinned tool version alone is a stable key. Restore-then-install: the
      # install is a fast no-op on a hit and only rebuilds on a version bump.
      - name: Cache gremlins binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gremlins
          key: ${{ runner.os }}-tool-gremlins-${{ env.GREMLINS_VERSION }}
      - name: Install gremlins (pinned)
        # GOTOOLCHAIN=auto lets `go install` fetch the newer Go the gremlins
        # module requires to *build the tool*, without changing the `go`
        # toolchain that gremlins itself then uses for `go test` on this module.
        env:
          GOTOOLCHAIN: auto
        run: go install "github.com/go-gremlins/gremlins/cmd/gremlins@${GREMLINS_VERSION}"
      - name: Unleash gremlins on the whole module
        continue-on-error: true   # report-only — see gating policy at top of file
        run: |
          gremlins unleash . \
            --output mutation-report.json \
            --threshold-efficacy "${MUTATION_EFFICACY_MIN}" \
            --threshold-mcover "${MUTATION_MCOVER_MIN}"
      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.json
          if-no-files-found: warn

  scoped:
    name: Per-merge scoped run (changed lines only) — report-only
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gremlins --diff needs history back to the merge base
          # The merge queue's post-merge tree (the commit actually about to land).
          ref: ${{ github.event.merge_group.head_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Determine whether this merge changes non-test Go source
        id: changed
        # Decide BEFORE installing gremlins (issue #146): the install fetches a
        # newer Go toolchain (GOTOOLCHAIN=auto) to *build* the tool, which is the
        # expensive part. A docs-only / tests-only merge has nothing to mutate, so
        # skipping the install (and the run) here saves that whole cost.
        env:
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          set -euo pipefail   # fail fast: a broken diff must not look like "no changes"
          # Skip entirely when the merge touches no non-test Go source — otherwise
          # an empty diff would make gremlins fall back to mutating the whole
          # module, defeating the point of the scoped job. The `|| true` is scoped
          # to *grep* alone (its exit 1 just means "no match"); a failing git diff
          # still propagates via pipefail rather than masquerading as an empty result.
          changed=$(git diff --name-only "${BASE_SHA}...HEAD" -- '*.go' \
                    | { grep -vE '_test\.go$' || true; })
          if [ -z "$changed" ]; then
            echo "No non-test Go source changed by this merge — nothing to mutate."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed Go source (mutants will be restricted to these diffs):"
            echo "$changed"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      # Cache the compiled gremlins binary (issue #151) — see the full job above.
      # Gated on the same condition as the install so a tests-only PR skips both.
      - name: Cache gremlins binary
        if: steps.changed.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gremlins
          key: ${{ runner.os }}-tool-gremlins-${{ env.GREMLINS_VERSION }}
      - name: Install gremlins (pinned)
        if: steps.changed.outputs.run == 'true'
        env:
          GOTOOLCHAIN: auto
        run: go install "github.com/go-gremlins/gremlins/cmd/gremlins@${GREMLINS_VERSION}"
      - name: Unleash gremlins on lines changed by this merge
        if: steps.changed.outputs.run == 'true'
        continue-on-error: true   # report-only — see gating policy at top of file
        env:
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          set -euo pipefail
          gremlins unleash . \
            --diff "${BASE_SHA}" \
            --output mutation-report.json \
            --threshold-efficacy "${MUTATION_EFFICACY_MIN}" \
            --threshold-mcover "${MUTATION_MCOVER_MIN}"
      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-merge
          path: mutation-report.json
          if-no-files-found: ignore

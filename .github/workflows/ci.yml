name: CI

# Every job and step is named for *what it verifies*, so the Actions summary
# reads as a checklist a reviewer can scan at a glance.
#
# Gating policy:
#   - Blocking:    build, module hygiene, zero-dependency guard, tests
#                  (race + shuffle) across the OS × Go-version matrix below,
#                  coverage floor, gofmt, go vet, golangci-lint
#                  (incl. cyclop/gocognit complexity), gosec, the examples
#                  golden-output E2E (build + run + assert stdout, see #30),
#                  the tools/benchreport satellite-module tests (#90),
#                  cross-arch (386 build+vet+test, arm64/s390x build+vet),
#                  the fuzz smoke run, and the merge-queue benchmark regression
#                  gate (govulncheck moved to a daily schedule — see below).
#                  cross-arch and fuzz were promoted from report-only (#72): both
#                  are deterministic — cross-arch is a fixed cross-compile/run,
#                  and fuzz is now count-based (-fuzztime=NNNNx, not a wall-clock
#                  budget) — so a failure is a real signal, not runner noise.
#                  benchmarks was promoted (#114, #128): it now fails the build,
#                  but ONLY on a catastrophic, order-of-magnitude regression
#                  (≥ BENCH_REGRESS_FACTOR× slower, default 10x, AND statistically
#                  significant). That deliberately-coarse threshold is what makes
#                  it safe to gate on shared/noisy runners — see the job header.
#   - merge-only:  the cross-platform macOS/Windows test cells and the benchmark
#                  A/B regression gate run ONLY in the merge queue (merge_group),
#                  once per merge, not on every PR push (issue #150). They still
#                  gate before a PR lands — the merge queue counts as pre-merge —
#                  at a fraction of the per-push cost.
#   - elsewhere:   jobs whose verdict tracks time/external state or only matters
#                  at release no longer live here at all (issue #150): Go tip and
#                  govulncheck moved to a schedule (.github/workflows/maintenance.yml),
#                  API compatibility moved to a tag/release trigger
#                  (.github/workflows/release.yml). See those files.
#   - main-only:   bench-report regenerates BENCHMARKS.md, docs/bench.svg and
#                  the README preview, archives this commit into the long-term
#                  trend store (docs/bench/history/, issue #51) and re-renders the
#                  trend section + report-only regression check, then bot-commits
#                  with `[skip ci]` (issue #50). It runs only on push to main and
#                  is the sole job with contents:write; the `[skip ci]` tag stops
#                  it re-triggering CI.
#
# Branch protection (#41): the ONLY required check is the `CI Gate` job, which
# `needs:` every blocking job and fails unless they all succeed. Requiring a
# single stable context — rather than the individual (and matrix-suffixed) job
# names — means adding/renaming jobs or matrix cells never silently wedges PRs
# with a required check that never reports. To change what gates, edit `CI Gate`'s
# `needs:` list, not the GitHub branch-protection rule.
#
# Test matrix (see #33, cost-tuned in #146, trigger-rationalised in #150): the
# `test` job gates Linux/macOS/Windows on the primary (go.mod) Go version, plus
# the previous minor on Linux. The `setup` job decides the cell list per event:
#   pull_request / push-to-main → Linux cells only {1.24, 1.23} — fast, cheap,
#     ~all real failures for a pure-Go library surface here.
#   merge_group (merge queue)   → the FULL matrix incl. macOS (billed 10x) and
#     Windows (2x), run ONCE per merge right before landing.
# macOS/Windows therefore run exactly once per merge — in the queue — never on a
# PR push and not re-run on the post-merge push to main (issue #150). The merge
# queue is the pre-release cross-platform gate; if it is ever disabled, re-add
# macOS/Windows to the push-to-main path so main can't go red cross-platform.
# `cross-arch` (386/arm64/s390x) gates on every event (#72) — deterministic and
# cheap, and the real platform bug surface (word size / endianness) for this
# library. Go tip moved to a weekly schedule (maintenance.yml, issue #150).
#
# Cost controls (#146, #150): a top-level `concurrency` block cancels a PR's
# superseded in-progress run on each new push; the macOS/Windows cells and the
# benchmark A/B gate are off the PR path entirely (merge-queue-only); the
# time/release-driven jobs moved out to their own workflows. None of this weakens
# a gate — every blocking job still runs before a release (the merge queue counts
# as pre-merge), just not on every PR iteration.
#
# Coverage floor is 100% (current total is 100%); the issue-#7 goal of 85% and
# the issue-#45 goal of 100% are both met. This is now a hard "no untested code"
# gate — every new statement must ship with a covering test. Truly unreachable
# defensive branches should be refactored away (or made reachable) rather than
# lowering this floor.

on:
  push:
    branches: [main]
  pull_request:
  # merge_group drives the GitHub merge queue (enabled in branch protection,
  # issue #150). It runs the FULL gate — including the cross-platform
  # macOS/Windows cells and the benchmark A/B regression gate that no longer run
  # on PR pushes (see the `setup`/`test`/`benchmarks` jobs) — once per merge,
  # immediately before a PR lands, against the actual post-merge tree. That makes
  # the queue both the pre-release cross-platform/perf gate AND the cure for the
  # "passed CI on a stale base, then broke main after merge" failure mode.
  merge_group:

# Cost control (issue #146): cancel a PR's older, still-running CI when a newer
# commit is pushed to the same PR, instead of letting the superseded run burn
# the full matrix + benchmark minutes to completion. Keyed by PR number on
# pull_request; on push-to-main / merge_group there is no PR number, so the key
# falls back to the unique run_id — meaning those runs NEVER cancel each other
# (a main push must not abort the contents:write bench-report job mid-commit).
# This mirrors mutation.yml's proven keying.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COVERAGE_MIN: "100"   # hard floor: 100% coverage, no untested code (issue #45) — ratchet upward only
  # Primary (go.mod) Go version; the test matrix gates this on every OS and uses
  # it to pick the single Codecov-uploading cell. Keep in sync with go.mod.
  # (The matrix itself can't read env, so the version literals live there.)
  GO_PRIMARY: "1.24"
  # Pin the security-tool version so CI is reproducible; bump deliberately.
  # (govulncheck moved to maintenance.yml and gorelease to release.yml — issue
  # #150 — so their pins now live in those workflows.)
  GOSEC_VERSION: "v2.27.1"
  # golang.org/x/perf ships only pseudo-versions (no semver tags); pin one.
  BENCHSTAT_VERSION: "v0.0.0-20260615155930-9e4b9ddef5b6"
  # Benchmark knobs. Wall time ≈ (sub-benchmarks) × per-sample-time × count ×
  # branches. A *duration* budget (not a count-based -benchtime=Nx) is the RIGHT
  # lever for this suite: many benchmarks do O(size) work per op at sizes up to
  # 1,000,000, and a duration auto-scales b.N down for them — a count forces
  # b.N=N and makes the 1M cells ~150× slower (issue #112).
  #
  # The formula only holds when each benchmark's whole body is timed. It does
  # NOT bound a benchmark that does cheap (ns) timed work but O(size) per-
  # iteration b.StopTimer() setup: Go drives b.N up until the *timed* work
  # reaches the budget while the untimed setup runs b.N times uncapped, so
  # wall ≈ b.N × setup_cost. Those 9 benchmarks were the hour-plus blow-up of
  # issue #112; they've been restructured to build their fixture once and time a
  # balanced op+inverse round-trip (no per-iteration b.StopTimer(), which also
  # reads memstats under -benchmem and explodes at ns-scale b.N). Keep new
  # benchmarks self-contained-per-op so this budget stays honest.
  #
  # Two budgets, because the suite is large (~900 sub-benchmarks):
  #   BENCH_TIME / BENCH_COUNT — the main-only canonical report (bench-report
  #     job), where stable ns/op and trend comparability matter; full ladder.
  #   BENCH_AB_TIME / BENCH_AB_COUNT — the merge-queue A/B regression job, which
  #     runs the whole suite twice (base + head). With ~900 sub-benchmarks even 50ms×8
  #     would be ~20 min, so the A/B job uses a short per-sample budget and
  #     leans on samples (count) over per-sample time for noise resistance, the
  #     way benchstat prefers. Giant cells (100k/1M) are too noisy on shared
  #     runners to gate on anyway, so a short sample there costs little signal.
  # Tune here if CI time drifts.
  BENCH_TIME: "50ms"     # canonical-report per-sample duration (millions of ns-scale iters)
  BENCH_COUNT: "8"       # canonical-report benchstat samples (issue #31 suggests 6–10)
  BENCH_AB_TIME: "2ms"   # merge-queue A/B per-sample duration — keeps both passes ≈ a few min (issue #112)
  BENCH_AB_COUNT: "6"    # merge-queue A/B benchstat samples (kept at the 6–10 floor; count beats time for noise)
  # Regression-gate threshold for the merge-queue `benchmarks` job (issues #114, #128).
  # Expressed as a *factor*, NOT a small percent, on purpose: the gate must only
  # fire on a gross, order-of-magnitude regression (≈10x slower / +900%) — an
  # accidental O(n)→O(n²), a dropped preallocation that explodes allocs/op, or a
  # lock on a hot path. The PR suite runs on SHARED GitHub-hosted runners whose
  # variance dominates any modest (20–50%) delta, so a small-percent threshold
  # would flap constantly and erode trust; framing it as "10x" keeps the policy
  # legible — this catches only catastrophe, by design. Tighten ONLY if/when the
  # suite moves to a quiet/dedicated runner (the documented next lever is also
  # "two consecutive regressing runs" before reaching for dedicated infra).
  BENCH_REGRESS_FACTOR: "10"          # min ratio (head/base) to flag a regression; applied to sec/op, B/op, allocs/op

jobs:
  setup:
    # Decide the `test` matrix per event so the expensive cross-platform cells
    # are paid for only when they add release-gating value (issues #146, #150).
    #   merge_group → the FULL matrix incl. macOS (10x) + Windows (2x). This is
    #     the ONLY event that runs them, once per merge, right before landing —
    #     so cross-platform correctness gates pre-release without charging any
    #     PR push or re-running on the post-merge push to main.
    #   pull_request / push → Linux only (primary go.mod Go + previous minor).
    #     Fast, cheap feedback; macOS/Windows almost never surface a Linux-green
    #     failure for a pure-Go library, and the queue covers them pre-merge.
    # The matrix literals live here because `strategy.matrix` can't read `env`.
    name: Decide test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Select full cross-platform (merge queue) vs Linux-only (PR / push)
        id: set
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-latest","go":"1.24"},{"os":"macos-latest","go":"1.24"},{"os":"windows-latest","go":"1.24"},{"os":"ubuntu-latest","go":"1.23"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"ubuntu-latest","go":"1.24"},{"os":"ubuntu-latest","go":"1.23"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & module hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compile every package
        run: go build ./...
      - name: Ensure go.mod (and go.sum) are tidy and committed
        # git status --porcelain catches modified *and* newly-created/untracked
        # files (e.g. a go.sum that `go mod tidy` would add), which `git diff`
        # alone would miss.
        run: |
          go mod tidy
          changed=$(git status --porcelain -- go.mod go.sum)
          if [ -n "$changed" ]; then
            echo "::error::go.mod/go.sum are not tidy — run 'go mod tidy' and commit the result:"
            echo "$changed"
            git diff -- go.mod go.sum
            exit 1
          fi
          echo "go.mod/go.sum are tidy ✔"
      - name: Enforce zero runtime dependencies
        run: |
          if grep -qE '^[[:space:]]*require' go.mod; then
            echo "::error::Unexpected dependency in go.mod — this library must stay zero-dependency"
            grep -nE '^[[:space:]]*require' go.mod
            exit 1
          fi
          echo "go.mod declares no dependencies ✔"
      - name: Verify module integrity
        run: go mod verify

  test:
    # Gating matrix: catch platform- and version-specific breakage (concurrency
    # / -race behaviour, map-iteration order, path/newline assumptions) that a
    # single ubuntu+go.mod cell would miss. The cell list is computed by the
    # `setup` job per event (issues #146, #150):
    #   PR / push main → Linux × {1.24, 1.23}                     (2 cells)
    #   merge_group    → + macOS × 1.24 + Windows × 1.24          (4 cells)
    # so macOS (10x) and Windows (2x) — which dominate the per-run dollar cost —
    # are paid for only ONCE per merge, in the queue, while every PR push still
    # gets Linux + -race + the previous-minor backward-compat check fast and
    # cheap. Cross-platform correctness still gates before a release (the merge
    # queue is pre-merge), satisfying #146's "must still run before a release"
    # constraint. Wider experimental coverage (Go tip) moved to a weekly schedule
    # (maintenance.yml, #150); exotic arches live in `cross-arch` below.
    name: Test (race + coverage) — ${{ matrix.os }} / Go ${{ matrix.go }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other cells when one fails — we want every platform's
      # pass/fail visible in one run, not a single early abort.
      fail-fast: false
      # Cells decided per event by `setup` (Linux-only on PRs; full cross-
      # platform on push/merge_group). Using only `include` entries keeps the
      # event-conditional shape in one place — the setup job — rather than
      # smeared across matrix axes that can't read the event.
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    defaults:
      run:
        # windows-latest defaults to PowerShell; force bash (Git Bash ships on
        # the runner) so the awk/tr/tail coverage steps are portable across cells.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          # Zero-dependency repo: no go.sum exists, so key the (per-OS, per-Go)
          # build cache off go.mod. setup-go restores ~/.cache/go-build across
          # runs, keeping the matrix affordable (see #25).
          cache-dependency-path: go.mod
      - name: Run tests with race detector and shuffled order
        # -shuffle=on surfaces order-dependence; doc Example funcs with
        # // Output: are verified here as part of `go test`.
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - name: Report total coverage
        run: go tool cover -func=coverage.out | tail -1
      - name: Enforce minimum coverage floor
        run: |
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${pct}% (floor: ${COVERAGE_MIN}%, goal: 85%)"
          # Pass values via -v rather than interpolating into the awk program.
          if awk -v pct="$pct" -v min="$COVERAGE_MIN" 'BEGIN{exit !(pct >= min)}'; then
            echo "Coverage ${pct}% meets the ${COVERAGE_MIN}% floor ✔"
          else
            echo "::error::Coverage ${pct}% dropped below the ${COVERAGE_MIN}% floor"
            exit 1
          fi
      - name: Upload coverage to Codecov (non-gating)
        # Upload from a single cell only (Linux + primary Go) so the matrix
        # doesn't push N duplicate reports for the same source.
        if: matrix.os == 'ubuntu-latest' && matrix.go == env.GO_PRIMARY
        # v5 uses the CLI uploader, which requires CODECOV_TOKEN even for
        # public repos (tokenless uploads were deprecated). Add the token as
        # a repo secret (Settings → Secrets → Actions → CODECOV_TOKEN).
        # Kept non-gating: the coverage floor above is the authoritative gate,
        # so a flaky upload must not block a merge.
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  cross-arch:
    # Blocking (#72): build/test across non-amd64 arches to catch word-size and
    # endianness assumptions. 386 binaries execute on the amd64 host (pure-Go,
    # statically linked); arm64/s390x can't run here, so they are build+vet only.
    # s390x is big-endian — the cheapest way to surface endianness bugs.
    # Deterministic and cheap (a fixed cross-compile/run, no runner-noise), so it
    # now gates rather than merely warning — promoted per the ratchet pattern.
    name: Cross-arch build/test — GOARCH=${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: "386"      # 32-bit word size; tests run on the amd64 host
            run-tests: true
          - goarch: arm64      # cross-compile + vet only (can't execute on amd64)
            run-tests: false
          - goarch: s390x      # big-endian — surfaces endianness assumptions
            run-tests: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Target GOARCH=${{ matrix.goarch }}
        # Set after setup-go so the toolchain install isn't affected; exported
        # via $GITHUB_ENV so all later steps cross-compile for this arch.
        run: echo "GOARCH=${{ matrix.goarch }}" >> "$GITHUB_ENV"
      - name: Compile every package
        run: go build ./...
      - name: Vet for suspicious constructs
        run: go vet ./...
      - name: Run tests (no -race; unsupported on 386)
        if: matrix.run-tests
        # -race isn't supported on 386; -shuffle still surfaces order-dependence.
        run: go test -shuffle=on ./...

  lint:
    name: Lint, format & complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
          echo "All files are gofmt-clean ✔"
      - name: Vet for suspicious constructs
        run: go vet ./...
      - name: Static analysis, style & complexity (golangci-lint)
        # Aggregates staticcheck, errcheck, ineffassign, unconvert, misspell,
        # revive, cyclop (cyclomatic) and gocognit (cognitive). Blocking: the
        # debt it surfaced has been paid down (see #9), so it now gates.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  gosec:
    # Static security analysis — code-dependent, so it gates every PR (issue
    # #150 split the old `security` job: gosec stays here because its verdict
    # changes with the diff; govulncheck moved to a daily schedule because its
    # verdict tracks the vuln advisory DB over time, not this PR's code — see
    # maintenance.yml).
    name: Security lint (gosec — static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Restore ~/.cache/go-build so the gosec install below relinks from
          # cached objects instead of recompiling from source (issue #151).
          cache-dependency-path: go.mod
      # Cache the compiled gosec binary, keyed on pinned-version + Go-minor + OS
      # (issue #151). The pinned version lives in `env:`, so the key is stable and
      # busts only on a deliberate bump. Restore-then-`go install`: install is a
      # fast no-op on a hit, removing a per-run rebuild of a non-trivial program.
      # (govulncheck's cache moved with it to maintenance.yml.)
      - name: Cache gosec binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gosec
          key: ${{ runner.os }}-tool-gosec-${{ env.GOSEC_VERSION }}-go${{ env.GO_PRIMARY }}
      - name: Security lint (gosec)
        # Blocking: gosec reports no issues, so it now gates against regressions.
        run: |
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          gosec ./...

  examples-e2e:
    # Blocking: the examples/ module is a SEPARATE module that consumes the
    # library as an outside package (its go.mod `replace`s the dependency with
    # the local checkout, so this builds against the CURRENT tree — see #30).
    # The root build/test/lint jobs run `./...` on the root module only and never
    # descend into examples/, so this dedicated job is what compiles and exercises
    # them. Each test `go run`s a real binary and diffs stdout against a checked-in
    # golden file, so a non-compiling, panicking, or output-drifting example fails
    # the build — catching public-API breakage the library's own tests can miss.
    name: Examples E2E (golden output, separate module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Drive the toolchain from the examples module's own go.mod.
          go-version-file: examples/go.mod
          cache-dependency-path: examples/go.mod
      - name: Build & golden-output E2E test the example apps
        # -shuffle=on surfaces order-dependence; the tests `go run` each app and
        # assert its stdout against testdata/*.golden. (No -race: the suite shells
        # out via `go run`, so the detector wouldn't see inside the child anyway.)
        working-directory: examples
        run: go test -shuffle=on ./...

  benchreport-test:
    # Blocking: tools/benchreport is a SEPARATE module (own go.mod) housing the
    # benchmark-report generator that `make bench-report` and the main-only
    # bench-report job invoke. The root build/test jobs run `./...` on the root
    # module only and never descend into it, so without this job its unit tests
    # (CSV parsing, stats, trend store, Markdown/SVG rendering) run nowhere in CI
    # — broken generator logic could merge undetected and only surface when the
    # bench-report job fails on main (#90). This dedicated job gates that gap,
    # mirroring the examples-e2e job's per-satellite-module structure.
    name: Benchreport tests (separate module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Drive the toolchain from the benchreport module's own go.mod.
          go-version-file: tools/benchreport/go.mod
          cache-dependency-path: tools/benchreport/go.mod
      - name: Test the benchmark-report generator
        # -shuffle=on surfaces order-dependence. No -race: the generator is
        # single-threaded (pure CSV→Markdown/SVG), so the detector adds cost
        # without coverage — matching the examples-e2e job's rationale.
        working-directory: tools/benchreport
        run: go test -shuffle=on ./...

  doc-compile:
    # Blocking PR-time gate (issue #151): make the package godoc examples in every
    # doc.go provably real. The doccompile tool symbol-checks each indented code
    # block against the library's exported API and compiles the parseable ones, so
    # a quick-start that references a non-existent symbol (collections.Pair-style
    # drift) or a renamed method fails CI. Cheap Linux, diff-sensitive, high
    # dependability value — exactly what belongs on every PR. The tool lives in its
    # own nested module (tools/doccompile); its own unit tests run first so a broken
    # guard is caught here too, mirroring the benchreport-test job's structure.
    name: Doc examples compile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Test the doccompile guard itself
        working-directory: tools/doccompile
        run: go test -shuffle=on ./...
      - name: Verify every doc.go example references real symbols and compiles
        working-directory: tools/doccompile
        run: go run . -root ../..

  fuzz:
    name: Fuzz (short run per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run every fuzz target for a fixed iteration count, in parallel
        # Blocking smoke run (#72). Two levers keep this job under budget and keep
        # it there as targets are added (see #25):
        #   1. Count-based -fuzztime (2000x, mirroring the benchmark job's
        #      -benchtime=10x) instead of a 30s wall-clock budget. The job's
        #      purpose is to confirm each target compiles, runs, and survives
        #      its seed corpus + a burst of generated inputs — not to fuzz
        #      deeply — so a fixed iteration count is sub-second per target and
        #      deterministic. Because the run is count-based (not wall-clock), a
        #      failure is a reproducible crasher, not runner noise — which is why
        #      this now gates. Deep fuzzing belongs in a separate scheduled job.
        #   2. Fan the targets out across cores with `xargs -P $(nproc)` after
        #      warming the build cache once, so wall-clock is ~ceil(targets /
        #      cores) rather than the serial sum.
        # Parallel stdout interleaves unreadably, so each target writes its own
        # log file which is replayed under a ::group:: afterwards, keeping output
        # attributable. No-ops gracefully when there are no targets yet.
        run: |
          set -uo pipefail
          go test -run='^$' ./...   # warm the build cache once, serially

          # Build the work list: "<pkg>\t<FuzzFn>", one target per line.
          jobs=$(for pkg in $(go list ./...); do
            dir=$(go list -f '{{.Dir}}' "$pkg")
            grep -rhoE '^func (Fuzz[A-Za-z0-9_]+)' "$dir"/*_test.go 2>/dev/null \
              | awk -v p="$pkg" '{print p"\t"$2}'
          done | sort -u)

          if [ -z "$jobs" ]; then
            echo "No fuzz targets found — nothing to fuzz yet."
            exit 0
          fi

          count=$(printf '%s\n' "$jobs" | grep -c .)
          echo "Found $count fuzz target(s); running -fuzztime=2000x across $(nproc) cores."

          # Each parallel worker writes to its own log (passed $logdir as $0) and
          # drops a marker file on failure. Different targets in one package are
          # separate `go test` processes — fine; -fuzz takes one pattern at a time.
          logdir=$(mktemp -d)
          printf '%s\n' "$jobs" | xargs -P "$(nproc)" -I{} bash -c '
            set -- {}
            pkg=$1; fn=$2
            base="${pkg//\//_}.${fn}"
            if ! go test -run="^$" -fuzz="^${fn}$" -fuzztime=2000x "$pkg" >"$0/${base}.log" 2>&1; then
              touch "$0/${base}.FAILED"
            fi
          ' "$logdir"

          # Replay per-target output, grouped so it stays attributable.
          for log in "$logdir"/*.log; do
            base=$(basename "$log" .log)
            echo "::group::$base"
            cat "$log"
            echo "::endgroup::"
          done

          failed=$(find "$logdir" -name '*.FAILED' -printf '%f\n' | sed 's/\.FAILED$//')
          if [ -n "$failed" ]; then
            echo "::error::Some fuzz targets found a crasher (see the grouped logs above):"
            echo "$failed"
            exit 1
          fi
          echo "All $count fuzz target(s) passed the count-based smoke run ✔"

  benchmarks:
    name: Benchmark regression (vs base) — merge queue / main
    runs-on: ubuntu-latest
    # Merge-queue-only A/B gate (issue #150). The PR A/B compare was the heaviest
    # per-push job, yet a regression's verdict is just as valid measured once at
    # merge time against the queue base — so it moved off PR pushes entirely:
    #   merge_group → benchmark the queue base and the merge head under identical
    #     settings, run benchstat, and GATE the merge on a catastrophic
    #     regression (the merge queue is pre-merge, so the gate is not weakened).
    #   push to main → compile-and-run smoke so `main` keeps green, runnable
    #     benchmarks (no base to diff against post-merge).
    # Skipped on pull_request (job-level `if` below): the `ci-gate` job tolerates
    # that skip on PRs and requires this job to SUCCEED on merge_group (see there).
    if: github.event_name != 'pull_request'
    #
    # GATE policy — order of magnitude only (issues #114, #128). A benchmark
    # fails the build only when BOTH hold:
    #   1. it is ≥ BENCH_REGRESS_FACTOR× slower (default 10x ≈ +900%), and
    #   2. benchstat reports a statistically significant change (the "vs base"
    #      column is a real delta, not "~", i.e. p < 0.05).
    # The same order-of-magnitude factor gates sec/op, B/op and allocs/op.
    #
    # Why a 10x factor and not, say, 20%? These benchmarks run on SHARED
    # GitHub-hosted runners whose infrastructure variance dwarfs any modest
    # delta — a 20% "regression" here is almost always noise, and gating on it
    # would flap and erode trust. The gate is deliberately catastrophe-only: it
    # catches an accidental O(n)→O(n²), a dropped preallocation, or a lock on a
    # hot path, and ignores the 20–50% deltas that are just runner weather.
    # Requiring significance on top keeps the edge cases honest. Tighten the
    # factor ONLY if the suite moves to a quiet/dedicated runner (the next lever
    # before that is "two consecutive regressing runs").
    #
    # NOTE (issue #150): the `perf-accepted` PR-label bypass that existed on the
    # old per-PR job is GONE on the merge-queue path — a merge_group run carries
    # no PR context (no labels), and a ≥10x catastrophic regression is virtually
    # never intentional. To land a deliberate order-of-magnitude perf trade-off,
    # bump BENCH_REGRESS_FACTOR in that commit (and back, if temporary).
    #
    # The gate is split across two steps on purpose: a best-effort
    # (continue-on-error) report step that writes the job summary and can never
    # block on a reporting hiccup, and a final decision step — the ONLY
    # non-continue-on-error step — that actually fails the build. That way
    # reporting flakiness and the gate verdict stay independent.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can check out and benchmark the queue base commit
          # within this same job (cheap no-op on push events).
          fetch-depth: 0
          # Bench the merge queue's head (the post-merge tree) on merge_group;
          # empty on push → checkout falls back to the default ref (main).
          ref: ${{ github.event.merge_group.head_sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      # Cache the compiled benchstat binary (issue #151) — see the security job
      # for the keying rationale. Restored before the install below so install is
      # a fast no-op on a cache hit.
      - name: Cache benchstat binary
        if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ~/go/bin/benchstat
          key: ${{ runner.os }}-tool-benchstat-${{ env.BENCHSTAT_VERSION }}-go${{ env.GO_PRIMARY }}
      # Install before any `git checkout` below: the binary lands in $GOBIN,
      # outside the work tree, so switching the tree to the base commit can't
      # disturb it.
      - name: Install benchstat (pinned)
        run: go install "golang.org/x/perf/cmd/benchstat@${BENCHSTAT_VERSION}"

      # push to main: no base to diff against — just confirm benchmarks compile
      # and run (the previous smoke behaviour).
      - name: Benchmark smoke (compile + run)
        if: github.event_name == 'push'
        continue-on-error: true
        run: go test -run='^$' -bench=. -benchtime=10x ./...

      # merge_group: A/B compare the queue base vs the merge head. This is the
      # gate, run once per merge right before landing.
      - name: Benchmark base vs merge head, compare with benchstat
        if: github.event_name == 'merge_group'
        # continue-on-error: a benchmark that errors or a pass that times out is
        # never itself fatal — it just leaves partial tables. The GATE lives in
        # the later "Fail on catastrophic regression" step and acts only on what
        # benchstat could actually measure, so a flaky run degrades to "no
        # regression detected" rather than a false failure.
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
          BASE_REF: ${{ github.event.merge_group.base_ref }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -uo pipefail
          # Short duration budget + samples-over-time (BENCH_AB_*), because this
          # job benchmarks the whole ~900-sub-benchmark suite twice (issue #112).
          # Each pass is also hard-capped with `timeout` as a belt-and-braces
          # guarantee on wall time: go test streams one result line per benchmark,
          # so a truncated pass still leaves a partial table for benchstat to diff
          # (report-only, so partial is fine). Tune AB_PASS_TIMEOUT with the knobs.
          AB_PASS_TIMEOUT="${AB_PASS_TIMEOUT:-150}"
          bench() {
            timeout --preserve-status "$AB_PASS_TIMEOUT" \
              go test -run='^$' -bench=. -benchmem \
              -benchtime="$BENCH_AB_TIME" -count="$BENCH_AB_COUNT" ./...
          }

          # The merge head is already checked out. Bench it first, then detach to
          # the base commit and bench that. A benchmark erroring is reported but
          # not fatal — partial output still feeds benchstat and the gate only
          # acts on benchmarks it could measure on both sides.
          echo "::group::Benchmark merge head ($HEAD_SHA)"
          bench | tee pr.txt || echo "::warning::benchmarks reported errors on merge head (partial table kept)"
          echo "::endgroup::"

          echo "::group::Benchmark base ($BASE_REF @ $BASE_SHA)"
          git checkout --quiet --detach "$BASE_SHA"
          bench | tee base.txt || echo "::warning::benchmarks reported errors on base (partial table kept)"
          echo "::endgroup::"

          echo "::group::benchstat base → merge head"
          # Human-readable table for the log / collapsed report detail, plus the
          # machine-readable CSV the regression gate parses (sec/op in seconds,
          # with a "vs base" delta column that is "~" when not significant).
          benchstat base.txt pr.txt | tee benchstat.txt
          benchstat -format=csv base.txt pr.txt > benchstat.csv 2>/dev/null || true
          echo "::endgroup::"

      - name: Evaluate regression gate and publish report (job summary)
        if: github.event_name == 'merge_group'
        # Best-effort: this step parses the gate, writes the verdict to a file the
        # FINAL step reads, and writes the report to the run summary. There is no
        # PR to comment on at merge time, so the merge-queue run summary is the
        # report surface (the deltas are still produced, just once per merge —
        # issue #150). continue-on-error so a reporting hiccup can never block;
        # the actual build-failing decision lives in the next step.
        continue-on-error: true
        env:
          BASE_REF: ${{ github.event.merge_group.base_ref }}
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -uo pipefail

          # --- Parse benchstat CSV → only the catastrophic regressions ----------
          # A row regresses when it is ≥ BENCH_REGRESS_FACTOR× slower AND the
          # change is statistically significant (the "vs base" column is a real
          # delta, not "~"). Columns per metric block:
          #   name, base, baseCI, head, headCI, vsBase, P
          # sec/op values are in seconds; the same factor gates B/op & allocs/op.
          : > regressions.tsv
          if [ -s benchstat.csv ]; then
            awk -v FACTOR="$BENCH_REGRESS_FACTOR" '
              BEGIN { FS = ","; factor = FACTOR + 0; curpkg = "" }
              index($0, ",") == 0 {                       # config ("key: value") or blank line
                if ($0 ~ /^pkg:/) { p = $0; sub(/^pkg:[ \t]*/, "", p); curpkg = p }
                next
              }
              $1 == "" {                                  # header / separator row sets the metric
                unit = ($2 == "sec/op" || $2 == "B/op" || $2 == "allocs/op") ? $2 : ""
                next
              }
              {                                           # data row
                if (unit == "" || $1 == "geomean") next
                name = $1; base = $2; head = $4; vs = $6; p = $7
                if (base == "" || head == "" || base + 0 <= 0) next
                if (vs == "~" || vs == "") next           # within noise — not significant
                f = (head + 0) / (base + 0)
                if (f < factor) next                      # below the order-of-magnitude gate
                printf "%s\t%s\t%s\t%s\t%s\t%.1f\t%s\t%s\n", unit, curpkg, name, base, head, f, vs, p
              }
            ' benchstat.csv > regressions.tsv || : > regressions.tsv
          fi
          count=$(grep -c . regressions.tsv || true)

          # --- Record the verdict for the final (gating) step -------------------
          echo "count=${count}" > gate-verdict.txt

          # --- Build the run-summary report -------------------------------------
          flags="\`-benchtime=$BENCH_AB_TIME -count=$BENCH_AB_COUNT -benchmem\`"
          gatedesc="gate: a benchmark must be **≥ ${BENCH_REGRESS_FACTOR}× slower** *and* statistically significant (p<0.05) to fail — catastrophe-only, by design, because shared GitHub-hosted runners are too noisy to gate on modest deltas"
          {
            if [ "$count" -gt 0 ]; then
              echo "## ❌ Benchmark regression gate — ${count} catastrophic regression(s) vs \`$BASE_REF\`"
            else
              echo "## ✅ No catastrophic benchmark regressions vs \`$BASE_REF\`"
            fi
            echo
            echo "Base \`${BASE_SHA:0:12}\` → merge head \`${HEAD_SHA:0:12}\` · ${flags}"
            echo
            echo "> ${gatedesc}."
            echo
            if [ "$count" -gt 0 ]; then
              echo "| Metric | Benchmark | Base | Head | Factor | Δ | p |"
              echo "|---|---|---|---|---|---|---|"
              awk -F'\t' '{
                unit=$1; pkg=$2; name=$3; base=$4; head=$5; fac=$6; delta=$7; p=$8
                sub(/-[0-9]+$/, "", name)                 # drop the -GOMAXPROCS suffix
                if (unit == "sec/op") { bd=sprintf("%.4g ns", base*1e9); hd=sprintf("%.4g ns", head*1e9) }
                else { bd=sprintf("%g", base); hd=sprintf("%g", head) }
                printf "| %s | %s · %s | %s | %s | %s× | %s | %s |\n", unit, pkg, name, bd, hd, fac, delta, p
              }' regressions.tsv
              echo
            else
              echo "_Modest deltas (e.g. 20–50%) are shared-runner noise and do **not** gate — see the full table below._"
              echo
            fi
            if [ -s benchstat.txt ]; then
              echo "<details><summary>Full benchstat table (all benchmarks, informational)</summary>"
              echo
              echo '```'
              cat benchstat.txt
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on catastrophic regression (the gate)
        if: github.event_name == 'merge_group'
        # The ONLY non-continue-on-error step in this job: it reads the verdict
        # the report step recorded and fails the merge on a real regression.
        # Reporting hiccups in the step above cannot reach here — if the verdict
        # file is missing (e.g. the comparison never produced CSV), treat it as
        # "no regression" so a reporting/benchmark hiccup is conservative and
        # never a false failure that wedges the merge queue.
        run: |
          set -uo pipefail
          count=0
          if [ -f gate-verdict.txt ]; then
            count=$(awk -F= '$1=="count"{print $2}' gate-verdict.txt)
          fi
          count=${count:-0}

          if [ "$count" -le 0 ]; then
            echo "No catastrophic benchmark regressions (≥ ${BENCH_REGRESS_FACTOR}× slower AND significant) ✔"
            exit 0
          fi
          echo "::error::${count} benchmark(s) regressed ≥ ${BENCH_REGRESS_FACTOR}× AND significantly — see the job summary."
          cat regressions.tsv 2>/dev/null || true
          exit 1

  bench-report:
    # main-only: regenerate the performance report (BENCHMARKS.md), the chart
    # (docs/bench.svg) and the README preview region, then bot-commit the result
    # so the project's performance story is visible and self-updating (issue #50).
    #
    # Deliberately isolated from the PR `benchmarks` job above, which stays
    # contents:read + report-only. This is the ONLY job that writes to the repo.
    #
    # Recursion guard (two layers): the job runs only on a direct push to main,
    # and the bot commit carries `[skip ci]`, which GitHub Actions honours by not
    # starting a new run — so the commit this job makes never re-triggers CI.
    #
    # Pushing to PROTECTED main: `main` is governed by a ruleset (required check
    # `CI Gate` + merge queue + no-force-push/no-delete). The default GITHUB_TOKEN
    # cannot bypass it (GitHub disallows the Actions app as a bypass actor on a
    # personal repo), so this job authenticates with a dedicated WRITE DEPLOY KEY
    # (secret `BENCH_REPORT_DEPLOY_KEY`) that IS a ruleset bypass actor. The
    # checkout below wires that key for SSH, so the `git push origin HEAD:main`
    # in the commit step lands directly, bypassing the queue for this one
    # doc/data commit — without weakening the gate for anyone else.
    #
    # Thin wrapper over `make bench-report` so local and CI generation can't
    # drift: the Make target owns the run → benchstat → generator pipeline.
    name: Benchmark report (main-only — regenerate & commit)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # No contents:write needed: the push authenticates via the SSH deploy key
    # (the GITHUB_TOKEN couldn't bypass the ruleset anyway), so the token stays
    # read-only like every other job.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the rebase-on-reject retry below has something to
          # rebase onto if main advances while this job runs.
          fetch-depth: 0
          # Authenticate as the write deploy key (a ruleset bypass actor) so the
          # commit step can push to protected main. Also rewrites the remote to
          # SSH, so the push/pull below go over the key, not the token.
          ssh-key: ${{ secrets.BENCH_REPORT_DEPLOY_KEY }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      # Cache the compiled benchstat binary (issue #151) — see the security job.
      - name: Cache benchstat binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin/benchstat
          key: ${{ runner.os }}-tool-benchstat-${{ env.BENCHSTAT_VERSION }}-go${{ env.GO_PRIMARY }}
      - name: Install benchstat (pinned)
        # Same pinned version as the PR A/B job, for a reproducible CSV format.
        run: go install "golang.org/x/perf/cmd/benchstat@${BENCHSTAT_VERSION}"
      - name: Capture CI dataset, archive trend snapshot, and regenerate the report
        # Captures the *ci* (secondary/indicative) environment only, archives this
        # commit's raw multi-sample run into the long-term trend store
        # (BENCH_HISTORY=1, issue #51), then re-renders the combined report —
        # including the trend section — from it + the committed reference dataset.
        # Uses the repo's BENCH_TIME/BENCH_COUNT knobs (exported from env above)
        # rather than the 10x smoke, so the numbers are meaningful. Only this
        # consistent CI environment feeds the trend store, so commit-to-commit
        # drift is comparable; the cap prunes the oldest snapshots to bound growth.
        run: |
          make bench-report \
            BENCH_ENV=ci \
            BENCH_TIER=secondary \
            BENCH_HISTORY=1 \
            BENCH_LABEL="CI — GitHub-hosted runner (ubuntu-latest)" \
            BENCH_MACHINE="shared ubuntu-latest runner (noisy)"
      - name: Publish the trend regression check to the run summary (report-only)
        # The trend store can flag a headline that regressed significantly across
        # two consecutive commits. There's no PR to comment on at push time, so
        # surface the verdict in the job summary. Never gates (issue #51): noisy
        # shared runners make a hard block untrustworthy.
        if: always()
        run: |
          if [ -s "build/bench-alert.md" ]; then
            cat build/bench-alert.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No trend regression check produced (insufficient history yet)." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Commit regenerated artifacts (if changed) with [skip ci]
        run: |
          set -euo pipefail
          # The reference dataset (docs/bench/reference.csv) is maintainer-owned
          # and never touched here — only the ci dataset, the rendered outputs,
          # and the appended/pruned trend snapshots under docs/bench/history/.
          paths="BENCHMARKS.md docs/bench.svg docs/bench/ci.csv docs/bench/history README.md"
          changed=$(git status --porcelain -- $paths)
          if [ -z "$changed" ]; then
            echo "No benchmark-artifact changes — nothing to commit."
            exit 0
          fi
          echo "Changed artifacts:"; echo "$changed"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $paths
          # [skip ci] in the subject is the recursion guard — keep it.
          git commit -m "chore(bench): refresh CI benchmark dataset & report [skip ci]"
          # Best-effort push (issue #199). This is a housekeeping refresh of
          # regenerable artifacts — it must NEVER fail the build. The push can be
          # rejected because main advanced (non-fast-forward) OR because the
          # merge-queue ruleset forbids direct pushes to main (GH013). Try a
          # direct push, then one rebase-and-retry; if it still can't land, warn
          # and exit 0 rather than reporting a red CI run on main. Once a durable
          # write path exists (a merge-queue bypass actor for the bot, or a
          # PR-based refresh — see #199), the push simply starts succeeding again
          # with no further change here.
          if git push origin HEAD:main; then
            echo "Pushed refreshed benchmark artifacts to main."
          elif git pull --rebase origin main && git push origin HEAD:main; then
            echo "Pushed refreshed benchmark artifacts to main after rebase."
          else
            echo "::warning::Could not push refreshed benchmark artifacts to main (branch advanced, or the merge-queue ruleset forbids direct pushes — GH013). Skipping: this refresh is best-effort and never gates. See issue #199."
          fi

  ci-gate:
    # Single stable required check for branch protection (see #41). Branch
    # protection requires ONLY this context — never the individual job names.
    # Because the test job is a matrix, its check-run names carry an
    # `— <os> / Go <ver>` suffix; requiring those bare names directly leaves a
    # required check that never reports ("Expected — Waiting for status to be
    # reported") and wedges PRs unmergeable. This aggregator absorbs matrix
    # dimensions, OS additions, and job renames so branch protection never breaks
    # when CI changes — update the `needs:` list here instead of the GitHub rule.
    name: CI Gate
    if: always()                       # run even if a dependency failed, so the gate can report
    # The blocking jobs. `setup` (matrix decision) is included so a failure there
    # fails the gate rather than silently letting `test` skip. `doc-compile`
    # (issue #151) gates the package godoc examples and runs on every event.
    # `benchmarks` is listed but runs ONLY on merge_group/push (issue #150): on a
    # pull_request it is intentionally `skipped`, which the event-aware logic
    # below tolerates; on merge_group it MUST succeed. Report-only / relocated
    # jobs (Go tip, govulncheck, api-compat, mutation) are not gates and stay out.
    needs: [setup, build, test, lint, gosec, examples-e2e, benchreport-test, doc-compile, cross-arch, fuzz, benchmarks]
    runs-on: ubuntu-latest
    steps:
      - name: Require all blocking jobs to have succeeded
        env:
          EVENT: ${{ github.event_name }}
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Event: $EVENT — blocking-job results: $RESULTS"
          # A hard failure or cancellation in ANY blocking job always fails the
          # gate. A job that was skipped because an upstream dependency failed
          # surfaces here as that upstream's `failure`, so this catches it too.
          case "$RESULTS" in
            *failure*|*cancelled*)
              echo "::error::A required job did not succeed — see the failed job above."
              exit 1 ;;
          esac
          # `skipped` is legitimate ONLY on pull_request, where the merge-queue-
          # only jobs (benchmarks) deliberately don't run (issue #150). On
          # merge_group / push every blocking job runs, so a skip there means a
          # gate silently didn't run — treat it as failure so the merge can't land
          # on missing coverage.
          if [ "$EVENT" != "pull_request" ]; then
            case "$RESULTS" in
              *skipped*)
                echo "::error::A blocking job was skipped on $EVENT — every gate must run before a merge lands."
                exit 1 ;;
            esac
          fi
          echo "All blocking jobs succeeded ✔"

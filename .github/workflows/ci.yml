name: CI

# Every job and step is named for *what it verifies*, so the Actions summary
# reads as a checklist a reviewer can scan at a glance.
#
# Gating policy:
#   - Blocking:    build, module hygiene, zero-dependency guard, tests
#                  (race + shuffle) across the OS × Go-version matrix below,
#                  coverage floor, gofmt, go vet, govulncheck, golangci-lint
#                  (incl. cyclop/gocognit complexity), gosec and the examples
#                  golden-output E2E (build + run + assert stdout, see #30).
#   - Report-only: Go tip; cross-arch (386 build+vet+test, arm64/s390x
#                  build+vet only); fuzz; benchmarks; API compatibility. These
#                  print findings/early warnings but do not fail the build (per
#                  #7's gating policy). On a PR the benchmark job also
#                  A/B-compares against the base branch with benchstat and posts
#                  the delta table — still advisory (see the job for the
#                  documented path to a future regression gate).
#   - main-only:   bench-report regenerates BENCHMARKS.md, docs/bench.svg and
#                  the README preview, then bot-commits with `[skip ci]` (issue
#                  #50). It runs only on push to main and is the sole job with
#                  contents:write; the `[skip ci]` tag stops it re-triggering CI.
#
# Branch protection (#41): the ONLY required check is the `CI Gate` job, which
# `needs:` every blocking job and fails unless they all succeed. Requiring a
# single stable context — rather than the individual (and matrix-suffixed) job
# names — means adding/renaming jobs or matrix cells never silently wedges PRs
# with a required check that never reports. To change what gates, edit `CI Gate`'s
# `needs:` list, not the GitHub branch-protection rule.
#
# Test matrix (see #33): the `test` job gates Linux/macOS/Windows on the primary
# (go.mod) Go version, plus the previous minor on Linux — 4 cells, kept small to
# control runner-minutes. `test-tip` (Go tip) and `cross-arch` (386/arm64/s390x)
# are report-only so exotic/experimental cells warn without blocking a merge.
#
# API-compatibility gating (#29): the api-compat job runs gorelease against the
# last released tag and reports the implied semver bump + any breaking changes.
# It is REPORT-ONLY pre-1.0, because breaking changes are permitted under semver
# while the major version is 0 — the output exists to inform the CHANGELOG and
# version-bump decision. Post-v1.0, flip it to blocking (drop continue-on-error
# and fail when gorelease reports incompatible changes to the stable API), per
# the project's "ratchet the gates" pattern.
#
# Coverage floor is 100% (current total is 100%); the issue-#7 goal of 85% and
# the issue-#45 goal of 100% are both met. This is now a hard "no untested code"
# gate — every new statement must ship with a covering test. Truly unreachable
# defensive branches should be refactored away (or made reachable) rather than
# lowering this floor.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  COVERAGE_MIN: "100"   # hard floor: 100% coverage, no untested code (issue #45) — ratchet upward only
  # Primary (go.mod) Go version; the test matrix gates this on every OS and uses
  # it to pick the single Codecov-uploading cell. Keep in sync with go.mod.
  # (The matrix itself can't read env, so the version literals live there.)
  GO_PRIMARY: "1.24"
  # Pin security-tool versions so CI is reproducible; bump deliberately.
  GOVULNCHECK_VERSION: "v1.3.0"
  GOSEC_VERSION: "v2.27.1"
  # gorelease lives in x/exp, which has no per-command tags — pin the pseudo-version.
  GORELEASE_VERSION: "v0.0.0-20260611194520-c48552f49976"
  # golang.org/x/perf ships only pseudo-versions (no semver tags); pin one.
  BENCHSTAT_VERSION: "v0.0.0-20260615155930-9e4b9ddef5b6"
  # Benchmark A/B knobs. Wall time ≈ (sub-benchmarks) × BENCH_TIME × BENCH_COUNT
  # × 2 branches, independent of runner speed since BENCH_TIME is a duration.
  # With ~440 sub-benchmarks that's ≈ 440 × 0.05 × 8 × 2 ≈ 6 min of bench time.
  # More samples (count) beats longer per-sample time for fighting runner noise,
  # so prefer raising BENCH_COUNT over BENCH_TIME. Tune here if CI time drifts.
  BENCH_TIME: "50ms"   # per-sample duration (plenty: even 50ms = millions of ns-scale iters)
  BENCH_COUNT: "8"     # benchstat samples per benchmark (issue #31 suggests 6–10)

jobs:
  build:
    name: Build & module hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compile every package
        run: go build ./...
      - name: Ensure go.mod (and go.sum) are tidy and committed
        # git status --porcelain catches modified *and* newly-created/untracked
        # files (e.g. a go.sum that `go mod tidy` would add), which `git diff`
        # alone would miss.
        run: |
          go mod tidy
          changed=$(git status --porcelain -- go.mod go.sum)
          if [ -n "$changed" ]; then
            echo "::error::go.mod/go.sum are not tidy — run 'go mod tidy' and commit the result:"
            echo "$changed"
            git diff -- go.mod go.sum
            exit 1
          fi
          echo "go.mod/go.sum are tidy ✔"
      - name: Enforce zero runtime dependencies
        run: |
          if grep -qE '^[[:space:]]*require' go.mod; then
            echo "::error::Unexpected dependency in go.mod — this library must stay zero-dependency"
            grep -nE '^[[:space:]]*require' go.mod
            exit 1
          fi
          echo "go.mod declares no dependencies ✔"
      - name: Verify module integrity
        run: go mod verify

  test:
    # Gating matrix: catch platform- and version-specific breakage (concurrency
    # / -race behaviour, map-iteration order, path/newline assumptions) that a
    # single ubuntu+go.mod cell would miss. Kept deliberately small to control
    # runner-minutes — every OS on the primary (go.mod) Go version, plus the
    # previous minor on Linux only as a cheap backward-compat check.
    #   Linux/macOS/Windows × Go 1.24  +  Linux × Go 1.23  = 4 cells.
    # Wider/experimental coverage (Go tip, exotic arches) lives in the
    # report-only `test-tip` and `cross-arch` jobs below.
    name: Test (race + coverage) — ${{ matrix.os }} / Go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other cells when one fails — we want every platform's
      # pass/fail visible in one run, not a single early abort.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24"]
        include:
          # Previous minor on Linux only: backward-compat early warning without
          # tripling the secondary-version cost across all three OSes.
          - os: ubuntu-latest
            go: "1.23"
    defaults:
      run:
        # windows-latest defaults to PowerShell; force bash (Git Bash ships on
        # the runner) so the awk/tr/tail coverage steps are portable across cells.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          # Zero-dependency repo: no go.sum exists, so key the (per-OS, per-Go)
          # build cache off go.mod. setup-go restores ~/.cache/go-build across
          # runs, keeping the matrix affordable (see #25).
          cache-dependency-path: go.mod
      - name: Run tests with race detector and shuffled order
        # -shuffle=on surfaces order-dependence; doc Example funcs with
        # // Output: are verified here as part of `go test`.
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...
      - name: Report total coverage
        run: go tool cover -func=coverage.out | tail -1
      - name: Enforce minimum coverage floor
        run: |
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${pct}% (floor: ${COVERAGE_MIN}%, goal: 85%)"
          # Pass values via -v rather than interpolating into the awk program.
          if awk -v pct="$pct" -v min="$COVERAGE_MIN" 'BEGIN{exit !(pct >= min)}'; then
            echo "Coverage ${pct}% meets the ${COVERAGE_MIN}% floor ✔"
          else
            echo "::error::Coverage ${pct}% dropped below the ${COVERAGE_MIN}% floor"
            exit 1
          fi
      - name: Upload coverage to Codecov (non-gating)
        # Upload from a single cell only (Linux + primary Go) so the matrix
        # doesn't push N duplicate reports for the same source.
        if: matrix.os == 'ubuntu-latest' && matrix.go == env.GO_PRIMARY
        # v5 uses the CLI uploader, which requires CODECOV_TOKEN even for
        # public repos (tokenless uploads were deprecated). Add the token as
        # a repo secret (Settings → Secrets → Actions → CODECOV_TOKEN).
        # Kept non-gating: the coverage floor above is the authoritative gate,
        # so a flaky upload must not block a merge.
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  test-tip:
    name: Test on Go tip (report-only — early toolchain warning)
    runs-on: ubuntu-latest
    # Report-only: tip is a moving target, so a failure here is an early warning
    # about an upcoming toolchain change, not a merge gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Stable toolchain only bootstraps the gotip installer below.
          go-version: stable
          cache-dependency-path: go.mod
      - name: Install Go tip (gotip)
        run: |
          go install golang.org/dl/gotip@latest
          gotip download
      - name: Run tests with race detector and shuffled order on tip
        run: gotip test -race -shuffle=on ./...

  cross-arch:
    # Report-only build/test across non-amd64 arches to catch word-size and
    # endianness assumptions. 386 binaries execute on the amd64 host (pure-Go,
    # statically linked); arm64/s390x can't run here, so they are build+vet only.
    # s390x is big-endian — the cheapest way to surface endianness bugs.
    name: Cross-arch build/test (report-only) — GOARCH=${{ matrix.goarch }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: "386"      # 32-bit word size; tests run on the amd64 host
            run-tests: true
          - goarch: arm64      # cross-compile + vet only (can't execute on amd64)
            run-tests: false
          - goarch: s390x      # big-endian — surfaces endianness assumptions
            run-tests: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Target GOARCH=${{ matrix.goarch }}
        # Set after setup-go so the toolchain install isn't affected; exported
        # via $GITHUB_ENV so all later steps cross-compile for this arch.
        run: echo "GOARCH=${{ matrix.goarch }}" >> "$GITHUB_ENV"
      - name: Compile every package
        run: go build ./...
      - name: Vet for suspicious constructs
        run: go vet ./...
      - name: Run tests (no -race; unsupported on 386)
        if: matrix.run-tests
        # -race isn't supported on 386; -shuffle still surfaces order-dependence.
        run: go test -shuffle=on ./...

  lint:
    name: Lint, format & complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
          echo "All files are gofmt-clean ✔"
      - name: Vet for suspicious constructs
        run: go vet ./...
      - name: Static analysis, style & complexity (golangci-lint)
        # Aggregates staticcheck, errcheck, ineffassign, unconvert, misspell,
        # revive, cyclop (cyclomatic) and gocognit (cognitive). Blocking: the
        # debt it surfaced has been paid down (see #9), so it now gates.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  security:
    name: Security (vuln scan + gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Scan for known vulnerabilities (govulncheck)
        run: |
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          govulncheck ./...
      - name: Security lint (gosec)
        # Blocking: gosec reports no issues, so it now gates against regressions.
        run: |
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          gosec ./...

  examples-e2e:
    # Blocking: the examples/ module is a SEPARATE module that consumes the
    # library as an outside package (its go.mod `replace`s the dependency with
    # the local checkout, so this builds against the CURRENT tree — see #30).
    # The root build/test/lint jobs run `./...` on the root module only and never
    # descend into examples/, so this dedicated job is what compiles and exercises
    # them. Each test `go run`s a real binary and diffs stdout against a checked-in
    # golden file, so a non-compiling, panicking, or output-drifting example fails
    # the build — catching public-API breakage the library's own tests can miss.
    name: Examples E2E (golden output, separate module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Drive the toolchain from the examples module's own go.mod.
          go-version-file: examples/go.mod
          cache-dependency-path: examples/go.mod
      - name: Build & golden-output E2E test the example apps
        # -shuffle=on surfaces order-dependence; the tests `go run` each app and
        # assert its stdout against testdata/*.golden. (No -race: the suite shells
        # out via `go run`, so the detector wouldn't see inside the child anyway.)
        working-directory: examples
        run: go test -shuffle=on ./...

  api-compat:
    name: API compatibility (gorelease vs last tag) — report-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gorelease and the latest-tag lookup both need the full tag history,
          # which the default shallow checkout omits.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Report API compatibility and implied semver bump
        # Report-only pre-1.0 (see the gating-policy comment at the top): breaking
        # changes are allowed while major version is 0, so this surfaces the verdict
        # without gating. gorelease itself also exits 0 for a pre-1.0 base even when
        # the API breaks (it just suggests a minor bump), so continue-on-error is a
        # belt-and-braces guard, not the only thing keeping the job green.
        continue-on-error: true
        run: |
          set -uo pipefail
          go install "golang.org/x/exp/cmd/gorelease@${GORELEASE_VERSION}"

          # Latest released semver tag (vMAJOR.MINOR.PATCH; skip pre-releases).
          base=$(git tag --sort=-version:refname \
                   | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$base" ]; then
            echo "No released semver tag found — nothing to diff against yet."
            echo "No released tag to compare against." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Comparing the working tree's public API against $base ..."

          # Write the report OUTSIDE the repo: gorelease treats any untracked file
          # in the working tree as "uncommitted changes" and aborts, so a report.txt
          # created in-place by the redirect would make it fail on itself.
          report="$(mktemp)"
          # gorelease exits non-zero only for a *failed* analysis (not for finding
          # breaking changes pre-1.0), so capture the status to distinguish the two.
          gorelease -base "$base" > "$report" 2>&1 && status=0 || status=$?
          cat "$report"

          suggested=$(grep -i 'Suggested version' "$report" | head -1 | sed 's/.*: //')
          # Count change lines that fall under a "## incompatible changes" header.
          incompat=$(awk '
            /^## incompatible changes/ {f=1; next}
            /^## compatible changes/   {f=0; next}
            /^# /                      {f=0; next}   # new package section ("# path")
            f && NF                    {c++}
            END                        {print c+0}' "$report")

          {
            echo "## API compatibility vs ${base}"
            echo
            if [ -z "$suggested" ] && [ "$status" -ne 0 ]; then
              # gorelease aborted (e.g. couldn't resolve the base) — don't imply a
              # clean bill of health from an analysis that never produced a verdict.
              echo "⚠️ gorelease could not complete the analysis (exit ${status}); see the job log."
            else
              [ -n "$suggested" ] && echo "**Suggested version:** ${suggested}"
              echo
              if [ "${incompat:-0}" -gt 0 ]; then
                echo "⚠️ **${incompat} incompatible (breaking) change(s)** detected — report-only"
                echo "pre-1.0. Flag these in the CHANGELOG and the version-bump decision."
              else
                echo "✅ No incompatible changes detected."
              fi
            fi
            echo
            echo "<details><summary>Full gorelease report</summary>"
            echo
            echo '```'
            cat "$report"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  fuzz:
    name: Fuzz (short run per target) — report-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run every fuzz target for a fixed iteration count, in parallel
        # Report-only smoke run. Two levers keep this job under budget and keep
        # it there as targets are added (see #25):
        #   1. Count-based -fuzztime (2000x, mirroring the benchmark job's
        #      -benchtime=10x) instead of a 30s wall-clock budget. The job's
        #      purpose is to confirm each target compiles, runs, and survives
        #      its seed corpus + a burst of generated inputs — not to fuzz
        #      deeply — so a fixed iteration count is sub-second per target and
        #      deterministic. Deep fuzzing belongs in a separate scheduled job.
        #   2. Fan the targets out across cores with `xargs -P $(nproc)` after
        #      warming the build cache once, so wall-clock is ~ceil(targets /
        #      cores) rather than the serial sum.
        # Parallel stdout interleaves unreadably, so each target writes its own
        # log file which is replayed under a ::group:: afterwards, keeping output
        # attributable. No-ops gracefully when there are no targets yet.
        continue-on-error: true
        run: |
          set -uo pipefail
          go test -run='^$' ./...   # warm the build cache once, serially

          # Build the work list: "<pkg>\t<FuzzFn>", one target per line.
          jobs=$(for pkg in $(go list ./...); do
            dir=$(go list -f '{{.Dir}}' "$pkg")
            grep -rhoE '^func (Fuzz[A-Za-z0-9_]+)' "$dir"/*_test.go 2>/dev/null \
              | awk -v p="$pkg" '{print p"\t"$2}'
          done | sort -u)

          if [ -z "$jobs" ]; then
            echo "No fuzz targets found — nothing to fuzz yet."
            exit 0
          fi

          count=$(printf '%s\n' "$jobs" | grep -c .)
          echo "Found $count fuzz target(s); running -fuzztime=2000x across $(nproc) cores."

          # Each parallel worker writes to its own log (passed $logdir as $0) and
          # drops a marker file on failure. Different targets in one package are
          # separate `go test` processes — fine; -fuzz takes one pattern at a time.
          logdir=$(mktemp -d)
          printf '%s\n' "$jobs" | xargs -P "$(nproc)" -I{} bash -c '
            set -- {}
            pkg=$1; fn=$2
            base="${pkg//\//_}.${fn}"
            if ! go test -run="^$" -fuzz="^${fn}$" -fuzztime=2000x "$pkg" >"$0/${base}.log" 2>&1; then
              touch "$0/${base}.FAILED"
            fi
          ' "$logdir"

          # Replay per-target output, grouped so it stays attributable.
          for log in "$logdir"/*.log; do
            base=$(basename "$log" .log)
            echo "::group::$base"
            cat "$log"
            echo "::endgroup::"
          done

          failed=$(find "$logdir" -name '*.FAILED' -printf '%f\n' | sed 's/\.FAILED$//')
          if [ -n "$failed" ]; then
            echo "::warning::Some fuzz targets reported failures (report-only, non-gating):"
            echo "$failed"
          else
            echo "All $count fuzz target(s) passed the count-based smoke run ✔"
          fi

  benchmarks:
    name: Benchmark regression (vs base) — report-only
    runs-on: ubuntu-latest
    # Performance is a mission pillar but was the one claim with no automated
    # guard (benchmarks ran smoke-only). On a PR this job benchmarks the base
    # branch and the PR head under identical settings and runs benchstat to
    # surface deltas + statistical significance. On push (no PR base) it falls
    # back to a compile-and-run smoke so `main` keeps green, runnable benchmarks.
    #
    # Report-only by design: GitHub-hosted runners are shared and noisy, so a
    # hard gate would be flaky. We publish the table and let humans judge.
    #
    # Documented path to a future regression GATE (do NOT enable until a
    # low-noise runner exists):
    #   1. Move benchmarks to a dedicated/self-hosted or otherwise quiescent
    #      runner — micro-benchmark deltas on shared runners are not trustworthy
    #      enough to block a merge.
    #   2. Then gate with `benchstat -format=csv` parsed for a tolerance, e.g.
    #      fail only when a benchmark regresses by > T% (start ~10%) AND
    #      benchstat reports p < 0.05 (a non-"~" delta). Two consecutive
    #      regressing runs reduces false positives further.
    #   3. Keep an allowlist/override label for intentional perf trade-offs.
    permissions:
      contents: read
      # The sticky report is a PR *conversation* comment, posted via the issues
      # comments endpoint (PRs are issues) — that needs issues:write, not just
      # pull-requests:write. Grant both so the comment posts on same-repo PRs;
      # all comment steps stay continue-on-error so forks (read-only token) just
      # fall back to the job summary.
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can check out and benchmark the PR's base commit
          # within this same job (cheap no-op on push events).
          fetch-depth: 0
          # Bench the PR head's actual commit, not the default merge ref, so the
          # base↔head diff (and the reported SHAs) are exactly the PR's changes.
          # Empty on push → checkout falls back to the default ref.
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Install before any `git checkout` below: the binary lands in $GOBIN,
      # outside the work tree, so switching the tree to the base commit can't
      # disturb it.
      - name: Install benchstat (pinned)
        run: go install "golang.org/x/perf/cmd/benchstat@${BENCHSTAT_VERSION}"

      # push to main: no PR base to diff against — just confirm benchmarks
      # compile and run (the previous smoke behaviour).
      - name: Benchmark smoke (compile + run)
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: go test -run='^$' -bench=. -benchtime=10x ./...

      # pull_request: A/B compare base vs head.
      - name: Benchmark base vs PR head, compare with benchstat
        if: github.event_name == 'pull_request'
        continue-on-error: true   # report-only: a slow/failed benchmark never blocks a merge
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          bench() {
            go test -run='^$' -bench=. -benchmem \
              -benchtime="$BENCH_TIME" -count="$BENCH_COUNT" ./...
          }

          # The PR head is already checked out. Bench it first, then detach to
          # the base commit and bench that. A benchmark erroring is reported but
          # not fatal (report-only) — partial output still feeds benchstat.
          echo "::group::Benchmark PR head ($HEAD_SHA)"
          bench | tee pr.txt || echo "::warning::benchmarks reported errors on PR head (report-only)"
          echo "::endgroup::"

          echo "::group::Benchmark base ($BASE_REF @ $BASE_SHA)"
          git checkout --quiet --detach "$BASE_SHA"
          bench | tee base.txt || echo "::warning::benchmarks reported errors on base (report-only)"
          echo "::endgroup::"

          echo "::group::benchstat base → PR head"
          benchstat base.txt pr.txt | tee benchstat.txt
          echo "::endgroup::"

      - name: Publish benchstat report (job summary + sticky PR comment)
        if: github.event_name == 'pull_request'
        continue-on-error: true   # report-only: reporting hiccups (e.g. fork tokens) never block
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          MARKER='<!-- benchstat-regression-report -->'
          {
            echo "$MARKER"
            echo "## Benchmark delta vs \`$BASE_REF\` (report-only)"
            echo
            echo "Base \`${BASE_SHA:0:12}\` → PR head \`${HEAD_SHA:0:12}\` · \`-benchtime=$BENCH_TIME -count=$BENCH_COUNT -benchmem\`"
            echo
            echo "> GitHub-hosted runners are shared and noisy, so **trust benchstat's significance, not raw numbers**: \`~\` means the change is within noise, and a delta only matters with a low \`p\`-value. This check never fails the build."
            echo
            if [ -s benchstat.txt ]; then
              echo '```'
              cat benchstat.txt
              echo '```'
            else
              echo "_No benchmark output to compare._"
            fi
          } > comment.md

          # The job summary works everywhere (incl. forked PRs) — publish there first.
          cat comment.md >> "$GITHUB_STEP_SUMMARY"

          # Best-effort sticky comment: update the prior report if one exists,
          # else create it. Needs pull-requests:write, so it's a graceful no-op
          # on forked-PR runs where the token is read-only.
          api="repos/${GITHUB_REPOSITORY}/issues"
          existing=$(gh api "${api}/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" 2>/dev/null | head -n1 || true)
          if [ -n "${existing:-}" ]; then
            gh api -X PATCH "${api}/comments/${existing}" -F body=@comment.md >/dev/null \
              && echo "Updated benchstat comment #${existing}." \
              || echo "::warning::Could not update PR comment (likely a fork's read-only token); see the job summary."
          else
            gh api -X POST "${api}/${PR_NUMBER}/comments" -F body=@comment.md >/dev/null \
              && echo "Posted benchstat comment." \
              || echo "::warning::Could not post PR comment (likely a fork's read-only token); see the job summary."
          fi

  bench-report:
    # main-only: regenerate the performance report (BENCHMARKS.md), the chart
    # (docs/bench.svg) and the README preview region, then bot-commit the result
    # so the project's performance story is visible and self-updating (issue #50).
    #
    # Deliberately isolated from the PR `benchmarks` job above, which stays
    # contents:read + report-only. This is the ONLY job that writes to the repo.
    #
    # Recursion guard (two layers): the job runs only on a direct push to main,
    # and the bot commit carries `[skip ci]`, which GitHub Actions honours by not
    # starting a new run — so the commit this job makes never re-triggers CI.
    #
    # Thin wrapper over `make bench-report` so local and CI generation can't
    # drift: the Make target owns the run → benchstat → generator pipeline.
    name: Benchmark report (main-only — regenerate & commit)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      # push-time only; the PR report path above stays contents: read.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the rebase-on-reject retry below has something to
          # rebase onto if main advances while this job runs.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Install benchstat (pinned)
        # Same pinned version as the PR A/B job, for a reproducible CSV format.
        run: go install "golang.org/x/perf/cmd/benchstat@${BENCHSTAT_VERSION}"
      - name: Regenerate report, chart, and README preview
        # Uses the repo's BENCH_TIME/BENCH_COUNT knobs (exported from env above)
        # rather than the 10x smoke, so the committed numbers are meaningful.
        run: make bench-report
      - name: Commit regenerated artifacts (if changed) with [skip ci]
        run: |
          set -euo pipefail
          changed=$(git status --porcelain -- BENCHMARKS.md docs/bench.svg README.md)
          if [ -z "$changed" ]; then
            echo "No benchmark-artifact changes — nothing to commit."
            exit 0
          fi
          echo "Changed artifacts:"; echo "$changed"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BENCHMARKS.md docs/bench.svg README.md
          # [skip ci] in the subject is the recursion guard — keep it.
          git commit -m "chore(bench): regenerate report, chart & README preview [skip ci]"
          # main may have advanced while we benchmarked; rebase and retry once.
          if ! git push origin HEAD:main; then
            echo "::warning::push rejected (main advanced); rebasing and retrying once"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

  ci-gate:
    # Single stable required check for branch protection (see #41). Branch
    # protection requires ONLY this context — never the individual job names.
    # Because the test job is a matrix, its check-run names carry an
    # `— <os> / Go <ver>` suffix; requiring those bare names directly leaves a
    # required check that never reports ("Expected — Waiting for status to be
    # reported") and wedges PRs unmergeable. This aggregator absorbs matrix
    # dimensions, OS additions, and job renames so branch protection never breaks
    # when CI changes — update the `needs:` list here instead of the GitHub rule.
    name: CI Gate
    if: always()                       # run even if a dependency failed, so the gate can report
    needs: [build, test, lint, security, examples-e2e]   # the blocking jobs only; report-only jobs stay out
    runs-on: ubuntu-latest
    steps:
      - name: Require all blocking jobs to have succeeded
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Blocking-job results: $results"
          case "$results" in
            *failure*|*cancelled*|*skipped*)
              echo "::error::A required job did not succeed — see the failed job above."
              exit 1 ;;
            *)
              echo "All blocking jobs succeeded ✔" ;;
          esac
